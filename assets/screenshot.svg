<svg xmlns="http://www.w3.org/2000/svg" width="820" height="470" viewBox="0 0 820 470" font-family="system-ui,Segoe UI,Helvetica,sans-serif">
  <rect width="820" height="470" fill="#1a1d24"/>
  <!-- portfolio -->
  <rect x="30" y="24" width="430" height="422" rx="12" fill="#0b0d12"/>
  <g transform="translate(54,60)">
    <text x="0" y="20" font-size="26" font-weight="800" fill="#e6edf3">Josh</text>
    <text x="0" y="44" font-size="13" fill="#9aa4b2">Full-stack engineer · TypeScript &amp; Python</text>
    <rect x="0" y="58" width="240" height="28" rx="14" fill="#11151c" stroke="#222a36"/>
    <circle cx="16" cy="72" r="5" fill="#22c55e"/>
    <text x="30" y="76" font-size="11.5" fill="#9aa4b2">Now: Nightcall — Kavinsky · Shipping</text>
    <text x="0" y="116" font-size="15" font-weight="700" fill="#e6edf3">Projects</text>
    <line x1="0" y1="124" x2="382" y2="124" stroke="#222a36"/>
    <rect x="0" y="134" width="382" height="52" rx="10" fill="#11151c" stroke="#222a36"/>
    <text x="14" y="156" font-size="13" font-weight="700" fill="#e6edf3">live-cursors</text>
    <text x="14" y="174" font-size="11.5" fill="#9aa4b2">Real-time multiplayer presence over WebSockets</text>
    <text x="0" y="218" font-size="15" font-weight="700" fill="#e6edf3">Writing</text>
    <line x1="0" y1="226" x2="382" y2="226" stroke="#222a36"/>
    <rect x="0" y="236" width="382" height="66" rx="10" fill="#11151c" stroke="#222a36"/>
    <text x="14" y="258" font-size="13" font-weight="700" fill="#e6edf3">Building a personal API</text>
    <text x="14" y="276" font-size="11" fill="#9aa4b2">2026-05-10 · serve your own data as JSON</text>
    <rect x="14" y="284" width="64" height="16" rx="5" fill="#1b2230"/><text x="46" y="296" font-size="10" fill="#818cf8" text-anchor="middle">architecture</text>
    <rect x="84" y="284" width="32" height="16" rx="5" fill="#1b2230"/><text x="100" y="296" font-size="10" fill="#818cf8" text-anchor="middle">api</text>
  </g>
  <!-- API responses -->
  <rect x="490" y="24" width="300" height="422" rx="12" fill="#0d1117" stroke="#21262d"/>
  <text x="510" y="50" font-size="13" fill="#7d8590" font-family="SFMono-Regular,monospace">GET /api/now</text>
  <text font-size="11.5" font-family="SFMono-Regular,monospace" xml:space="preserve">
    <tspan x="510" y="72" fill="#79c0ff">{</tspan>
    <tspan x="510" y="88" fill="#c9d1d9">  "status": </tspan><tspan fill="#a5d6ff">"online"</tspan><tspan fill="#c9d1d9">,</tspan>
    <tspan x="510" y="104" fill="#c9d1d9">  "track": </tspan><tspan fill="#a5d6ff">"Nightcall…"</tspan>
    <tspan x="510" y="120" fill="#79c0ff">}</tspan>
  </text>
  <text x="510" y="156" font-size="13" fill="#7d8590" font-family="SFMono-Regular,monospace">GET /api/posts</text>
  <text font-size="11.5" font-family="SFMono-Regular,monospace" xml:space="preserve">
    <tspan x="510" y="178" fill="#79c0ff">[</tspan>
    <tspan x="510" y="194" fill="#c9d1d9">  { "slug": </tspan><tspan fill="#a5d6ff">"hello"</tspan><tspan fill="#c9d1d9">,</tspan>
    <tspan x="510" y="210" fill="#c9d1d9">    "title": </tspan><tspan fill="#a5d6ff">"Building…"</tspan><tspan fill="#c9d1d9">,</tspan>
    <tspan x="510" y="226" fill="#c9d1d9">    "tags": [</tspan><tspan fill="#a5d6ff">"api"</tspan><tspan fill="#c9d1d9">] }</tspan>
    <tspan x="510" y="242" fill="#79c0ff">]</tspan>
  </text>
  <text x="510" y="278" font-size="13" fill="#7d8590" font-family="SFMono-Regular,monospace">GET /api/projects</text>
  <text x="510" y="300" font-size="11.5" fill="#c9d1d9" font-family="SFMono-Regular,monospace">[ { "name": "live-cursors" }, … ]</text>
  <rect x="510" y="330" width="260" height="96" rx="8" fill="#11161d"/>
  <text font-size="11.5" font-family="SFMono-Regular,monospace" xml:space="preserve">
    <tspan x="524" y="356" fill="#3fb950">$ pytest -q</tspan>
    <tspan x="524" y="376" fill="#3fb950">.........        [100%]</tspan>
    <tspan x="524" y="396" fill="#3fb950">9 passed</tspan>
    <tspan x="524" y="416" fill="#7d8590">markdown + JSON content</tspan>
  </text>
</svg>
